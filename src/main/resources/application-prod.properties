# Production profile: configure Postgres via environment variables

# DATABASE_URL from Render (use External Database URL from Render dashboard)
# Format: postgresql://user:password@host.region.render.com/database
# Just prepend jdbc: to convert to JDBC format
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep JPA sane defaults for prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool (Render free Postgres is tiny)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# SQL initialization disabled in prod by default
spring.sql.init.mode=never