# Production profile: configure Postgres via environment variables

# DATABASE_URL is automatically provided by Render in format:
# postgresql://user:password@host:port/database?sslmode=require
# Spring Boot automatically converts postgresql:// to jdbc:postgresql://
# and extracts username/password from the URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep JPA sane defaults for prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool (Render free Postgres is tiny)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# SQL initialization disabled in prod by default
spring.sql.init.mode=never