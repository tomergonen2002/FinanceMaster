# Production profile: configure Postgres via environment variables

# SPRING_DATASOURCE_URL is set by the startup script in Dockerfile
# It converts DATABASE_URL from postgresql://... to jdbc:postgresql://...with port
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep JPA sane defaults for prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool (Render free Postgres is tiny)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# SQL initialization disabled in prod by default
spring.sql.init.mode=never